# nginx DENTRO do container — serve o SPA com fallback pro index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # assets com hash: cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: qualquer rota cai no index.html.
    # index.html NUNCA é cacheado (sempre revalida) — assim um novo deploy aparece
    # na hora, sem hard refresh. Os assets com hash é que ficam cacheados.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
