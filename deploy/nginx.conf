# nginx DENTRO do container — serve o SPA com fallback pro index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # assets com hash: cache longo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
