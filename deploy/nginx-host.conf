# nginx do HOST (VPS) — proxy reverso do domínio pro container (porta 3005).
# Copie pra /etc/nginx/sites-available/ingles (ou /etc/nginx/conf.d/) e ative.
# O certbot adiciona o bloco 443 (SSL) automaticamente.
server {
    listen 80;
    server_name ingles.anapaulaperci.com.br;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
